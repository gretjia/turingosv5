id: C-076
title: "Commit-message claims must match actual diff (anti-false-closure)"
constitution:
  - "Art. V.1.2 (ArchitectAI commit authority — claims in commit message are part of the constitutional record per case C-073)"
  - "Case C-074 (FC-first) — fix-claims must trace to FC anchor; absent trace = absent verification"
  - "Case C-075 (DO-178C tool qualification) — gate machinery + audit transcripts are constitutional artifacts; commit messages that misrepresent fix coverage are silent governance drift"

source_lessons:
  - "A8 round-9 audit, Codex finding R9#1 (false-closure)"
  - "A8 round-10 audit Codex findings R10#1 + R10#2 (substantive gaps the previous commit's fixes missed)"
  - "A8 round-7 → round-8 PREREG amendment § 2 fix that left identical wording in § 8"

incident: |
  Phase A → B exit audit ran 10 rounds before reaching this case. Across the
  10 rounds the dual-audit pipeline caught **11 substantive defects**, of which
  **2 were false-closures** — i.e. a prior commit's message claimed a fix that
  the actual diff did not contain or did not complete:

  1. **A8e9 N3 false-closure (Codex R9#1)**:
     A8e9 commit message stated "N3 (Codex R8#3): Runner scripts default
     A8_AUDIT_ROUND updated; header metadata refreshed." The diff updated
     the header `printf` lines but **did not change the bash default**
     `${A8_AUDIT_ROUND:-R2}`. Re-running the runner without env still wrote
     to `_R2.md`, silently overwriting the round-2 transcript. The commit
     message asserted a fix that wasn't shipped; round-9 Codex caught it.

  2. **A8e fix F6 / A8e2 fix G2 → round-7 M4 → round-8 N1**:
     Round-1 audit Codex#1 caught PREREG_AMENDMENT § 2 calling p_0=0.10
     "strictest possible substitute" (backwards). F6 fixed § 2. G2 fixed
     § 8 wording. M4 (round-7) caught a parallel false claim in § 2(b)
     and fixed it. **But § 8's audit-requirements paragraph still had the
     same false claim "Gate H is Phase E and § 3 conditions ensure
     calibration runs first" — it survived F6, G2, AND M4 because each
     fix-pass was scoped to one § rather than full-document parity.**
     Round-8 Codex caught it as N1.

  3. **A8e7 structural rewrite → round-7 M3 → round-8 still found lineage**:
     A8e7 was a deliberate full rewrite to split packet (current-state)
     from history (chronology). A8e8 M3 stripped lineage from packet § 1
     + § 3. Round-8 Gemini + Codex both caught **8 more lineage residues**
     in subsections that M3 didn't reach. The commit message claimed
     "rewrite to current-state-only"; the diff was incomplete relative
     to the claim.

  Common pattern across all three: **the commit message named the fix at
  one level of granularity while the diff only addressed a subset of the
  surface that level implied.** Each round costs ~$5–7 in dual-audit API
  calls. Cumulative cost of unverified claims through round-9 = ~$25
  (rounds where the only finding was a false-closure or a residual missed
  by the previous round's incomplete fix).

facts: |
  After round-10, user explicitly directed (中文): "C，更新你的harness，
  加入判例" — option C = self-audit pass before round-11, plus harness
  update + new case to encode the lesson.

  The diagnosis user demanded: 到底发生了什么问题. The honest answer:
  the system code is sound (Gemini PASS × 3); the gate IS catching real
  defects (11 substantive bugs across 10 rounds); **the recurring
  CHALLENGE pattern is driven by my (Claude's) execution quality on
  multi-round metadata fixups — every commit message overstates fix
  coverage relative to the actual diff.**

  This is a craftsmanship problem, not an architectural one. The fix is
  not more audit rounds; it is a discipline that catches the false-
  closure class BEFORE the commit lands.

ruling: |
  **本案 commit-claim-diff parity discipline frozen**:

  Rule 1 — Pre-commit self-verification mandatory for any commit whose
  message lists ≥2 distinct fix items (e.g. "F1, F2, F3" / "M1–M5" /
  "P1+P2" / "fixed: A, B, C"):

    Step A: enumerate every fix-claim in the commit body
    Step B: for each claim, write a 1-line `Verified:` proof — typically
            a `grep -n` or `sed -n` snippet showing the diff actually
            contains the asserted change at the asserted location
    Step C: include the verifications inline in the commit body OR as a
            trailing `## Verifications` block before the
            `Co-Authored-By:` footer
    Step D: missing verification on any one claim → STOP, do not push,
            either complete the fix or remove the claim from the message

  Rule 2 — Post-commit audit-output check:

    After every dual-audit round whose merged verdict is CHALLENGE (not
    VETO, not PASS), re-read the previous fix bundle's commit message
    against the new findings. **If any new finding is the same logical
    surface a previous claim asserted to fix, the previous commit was a
    false-closure** and must be flagged in the next history entry as
    "false-closure caught" with explicit acknowledgement.

  Rule 3 — Multi-section parity check for any cross-document edit:

    When a fix targets a logical claim that appears in multiple sections
    or documents (e.g. "p_0=0.10 is strictest" appearing in § 2 + § 8
    + Q-row + genesis_payload header comment), the fix MUST grep the
    target string across the full repo and update every occurrence in
    the same commit. Sectioned fixes that leave parallel occurrences
    untouched are false-closures by Rule 2.

  Rule 4 — Audit transcripts append-only:

    Per case C-075 the dual-audit transcripts are constitutional
    artifacts. Re-running an audit round that overwrites a prior
    transcript = silent governance drift = automatic false-closure on
    any commit that left the runner default unable to distinguish.
    Runner scripts MUST refuse silent overwrite of any
    handover/audits/{CODEX,GEMINI}_PHASE_*_R<n>.md file. (A8e10 fix O1
    landed this; this case ratifies the discipline.)

  Rule 5 — R-020 enforcement (this commit + R-020 yaml):
    judge.sh hook detects multi-fix-bundle commit messages and warns
    the committer to apply Rule 1 before push. WARN-level (not BLOCK)
    because false-positive cost (legitimate single-fix commit that
    happens to mention 2+ words) > false-negative cost (audit catches
    in next round).

precedent: |
  - **Applies to**: every ArchitectAI commit (per Art. V.1.2 commit
    authority). The discipline is binding regardless of fix-count;
    Rule 1's ≥2-fix threshold is the WARN-trigger, not the discipline
    boundary.

  - **Cost rationale**: Rule 1's per-fix `Verified:` line costs ~30
    seconds per fix at commit time; saves ~1 audit round (~$5–7) per
    false-closure avoided. Through 10 Phase A audit rounds, ≥3 rounds
    were dominated by false-closure findings — a Rule 1 from round-1
    would have saved ~$15–20.

  - **Cross-ref**:
    - C-070 (pre-submission dual-audit + pre-reg discipline) — Rule 1
      is the analogue at single-commit granularity
    - C-073 (ArchitectAI commit authority) — claims in commit messages
      are part of the constitutional record this authority binds to
    - C-074 (FC-first problem handling) — Rule 3's multi-section
      parity check is the documentary analog of FC-first's
      "trace-before-patch" principle
    - C-075 (DO-178C tool qualification) — Rule 4's append-only
      transcript discipline is the operational implementation
    - R-020 (this commit) — judge.sh hook enforcing Rule 1 at
      pre-commit time
    - memory `feedback_phased_checkpoint` — multi-phase plans need
      hard checkpoints; Rule 2's post-CHALLENGE audit is the
      single-commit analog
