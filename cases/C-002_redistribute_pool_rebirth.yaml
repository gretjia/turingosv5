id: C-002
title: "redistribute_pool 重生注入 10K 违宪"
constitution:
  - "Law 2: Only Investment Costs Money"
source_lessons: [V3L-42, V3L-43]
incident: V-002
facts: |
  Agent 破产后 rebirth 机制通过 redistribute_pool 注入 10,000 Coin。
  这是 GENESIS 后的凭空印钞，违反 CTF 守恒。
ruling: |
  违宪。破产 Agent 应依靠 Law 1 (免费 append) 存活，不应获得新资金。
  rebirth 不注入新钱 — 这是宪法的明确规定。
precedent: |
  后续标准: 破产 = 零余额但可继续 append (免费)。不可通过任何机制
  给破产 Agent 注入 Coin。唯一例外: 系统做市商 CTF 守恒铸造
  (1000 Coin → 1000 YES + 1000 NO，非凭空印钞)。
rule: R-002
date: "2026-03-18"
severity: critical
