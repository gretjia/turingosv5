id: C-013
title: "虚假深度 / 去重粒度决定信息真伪"
constitution:
  - "Art. I.2: 统计信号"
source_lessons: [V3L-05, V3L-06]
incident: null
facts: |
  depth=25 但 novelty=1%：同一句话重复 100 次填充深度。启用去重后
  真实深度=14，novelty=100%。但全局去重杀死跨分支复用 — 同一引理
  不能出现在两个不同证明分支中。
ruling: |
  深度指标不等于信息指标。去重粒度决定系统行为：
  - 全局去重 → 禁止复用 → 降低群体效率
  - 分支感知去重 → 允许跨分支复用 → 保持信息完整性
precedent: |
  1. 不可信任未经去重验证的深度指标
  2. 去重必须是分支感知的 (branch-aware)，而非全局
  3. 统计信号 (Art. I.2) 要求确定性算法 — 去重算法必须确定性
rule: null
date: "2026-04-13"
severity: high
