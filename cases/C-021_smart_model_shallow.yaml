id: C-021
title: "聪明模型产生浅证明 / 智力需要约束"
constitution:
  - "Art. II.2.1: 探索与利用平衡"
source_lessons: [V3L-13]
incident: null
facts: |
  7B 模型: depth=14, 集中在 3 个根证明。
  14B 模型: depth=4, 分散在 9 个浅根。
  更强的模型因能力太强而注意力发散，反而产生更浅的结果。
ruling: |
  Art. II.2.1 警告"不能抹杀群体异质性"。但反面同样成立：
  过度能力 + 无约束 = 注意力发散 = 深度丧失。
  深度不来自智力，来自制度约束 (市场驱动的聚焦)。
precedent: |
  1. 模型能力 ≠ 系统深度。深度来自制度设计
  2. Boltzmann 温度不可太高 (发散) 也不可太低 (收敛)
  3. 制度变更 (去重、预算分离) 的效果 > 模型参数调优
rule: null
date: "2026-04-13"
severity: high
