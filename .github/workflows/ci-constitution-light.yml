name: ci-constitution-light

on:
  pull_request:
  push:
    branches: [main]

jobs:
  constitution-light:
    name: ci-constitution-light
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Board JSON
        run: jq . docs/harness/broadcast/TASK_BOARD.json
      - name: Harness task board
        run: cargo test --test harness_task_board
